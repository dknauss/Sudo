name: wp_sudo_nginx_multisite

services:
  db:
    image: mariadb:lts
    environment:
      MARIADB_DATABASE: wordpress
      MARIADB_USER: wordpress
      MARIADB_PASSWORD: wordpress
      MARIADB_ROOT_PASSWORD: root
      MARIADB_AUTO_UPGRADE: '1'
    healthcheck:
      test: ['CMD', 'healthcheck.sh', '--connect', '--innodb_initialized']
      interval: 5s
      timeout: 10s
      retries: 12
      start_period: 60s

  php:
    image: wordpress:php8.3-fpm
    depends_on:
      db:
        condition: service_healthy
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: wordpress
      WORDPRESS_DB_NAME: wordpress
      WORDPRESS_CONFIG_EXTRA: |
        define( 'FS_METHOD', 'direct' );
        define( 'WP_ALLOW_MULTISITE', true );
        define( 'MULTISITE', true );
        define( 'SUBDOMAIN_INSTALL', false );
        define( 'DOMAIN_CURRENT_SITE', '127.0.0.1:9081' );
        define( 'PATH_CURRENT_SITE', '/' );
        define( 'SITE_ID_CURRENT_SITE', 1 );
        define( 'BLOG_ID_CURRENT_SITE', 1 );
    volumes:
      - wordpress_multisite:/var/www/html
      - ../..:/var/www/html/wp-content/plugins/wp-sudo

  nginx:
    image: nginx:1.28-alpine
    depends_on:
      - php
    ports:
      - '9081:80'
    volumes:
      - wordpress_multisite:/var/www/html:ro
      - ../..:/var/www/html/wp-content/plugins/wp-sudo:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

  cli:
    image: wordpress:cli-php8.3
    depends_on:
      db:
        condition: service_healthy
      php:
        condition: service_started
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: wordpress
      WORDPRESS_DB_NAME: wordpress
      WORDPRESS_CONFIG_EXTRA: |
        define( 'FS_METHOD', 'direct' );
        define( 'WP_ALLOW_MULTISITE', true );
        define( 'MULTISITE', true );
        define( 'SUBDOMAIN_INSTALL', false );
        define( 'DOMAIN_CURRENT_SITE', '127.0.0.1:9081' );
        define( 'PATH_CURRENT_SITE', '/' );
        define( 'SITE_ID_CURRENT_SITE', 1 );
        define( 'BLOG_ID_CURRENT_SITE', 1 );
    volumes:
      - wordpress_multisite:/var/www/html
      - ../..:/var/www/html/wp-content/plugins/wp-sudo

volumes:
  wordpress_multisite:
