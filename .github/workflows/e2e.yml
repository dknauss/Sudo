name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: e2e-tests-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege default for GITHUB_TOKEN (CodeQL actions hardening).
permissions:
  contents: read

jobs:
  # Decide whether the heavy E2E matrix needs to run. Pull requests that touch
  # only documentation skip the groups; the "E2E Tests" gate job below still
  # runs and reports success, so the required status check is never left
  # pending (which would deadlock the PR). Fail-safe: any non-doc file, any
  # non-pull_request event, or any error → run E2E.
  changes:
    name: Detect code changes
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      pull-requests: read
    outputs:
      code: ${{ steps.decide.outputs.code }}
    steps:
      - name: Decide whether to run E2E
        id: decide
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "Event '${{ github.event_name }}' is not a pull_request — running E2E."
            echo "code=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if ! files=$(gh pr view "${{ github.event.pull_request.number }}" \
                --repo "${{ github.repository }}" --json files \
                --jq '.files[].path' 2>/dev/null); then
            echo "Could not list changed files — running E2E (fail-safe)."
            echo "code=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          code=false
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            case "$f" in
              *.md|*.txt|*.rst|docs/*|LICENSE) ;;   # documentation — does not require E2E
              *) code=true ;;                        # any non-doc file requires E2E
            esac
          done <<< "$files"
          echo "Changed files:"
          echo "$files"
          echo "Non-documentation files changed: $code"
          echo "code=$code" >> "$GITHUB_OUTPUT"

  e2e-group:
    name: "E2E Tests ${{ matrix.group-index }}/${{ matrix.group-total }} (${{ matrix.group-name }})"
    needs: changes
    if: ${{ needs.changes.outputs.code == 'true' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          # Keep four groups: wp-env startup is a fixed ~60s/job floor, so
          # rebalance inside the existing groups before adding more parallelism.
          - group-index: 1
            group-total: 4
            group-name: challenge-basic-admin
            test-command: |
              npm run test:e2e -- tests/e2e/specs/admin-bar-deactivate.spec.ts tests/e2e/specs/challenge.spec.ts --grep 'ABAR|CHAL-0[1-5]'
              npm run test:e2e -- tests/e2e/specs/challenge.spec.ts --grep 'CHAL-09|CHAL-10|CHAL-11'
          - group-index: 2
            group-total: 4
            group-name: challenge-2fa-ui
            test-command: |
              npm run test:e2e -- tests/e2e/specs/challenge.spec.ts --grep 'CHAL-0[6-8]'
              npm run test:e2e -- tests/e2e/specs/admin-bar-timer.spec.ts tests/e2e/specs/cookie.spec.ts tests/e2e/specs/gate-ui.spec.ts tests/e2e/specs/keyboard.spec.ts tests/e2e/specs/editor-reauth.spec.ts
          - group-index: 3
            group-total: 4
            group-name: challenge-lockout-surfaces
            test-command: |
              npm run test:e2e -- tests/e2e/specs/challenge.spec.ts --grep 'CHAL-12|CHAL-13|CHAL-14'
              npm run test:e2e -- tests/e2e/specs/access-grant.spec.ts tests/e2e/specs/public-api.spec.ts tests/e2e/specs/smoke.spec.ts tests/e2e/specs/stack-smoke.spec.ts
          - group-index: 4
            group-total: 4
            group-name: challenge-replay-multisite
            test-command: |
              npm run test:e2e -- tests/e2e/specs/challenge.spec.ts --grep 'CHAL-15|CHAL-16|CHAL-17'
              npm run test:e2e -- tests/e2e/specs/mu-plugin.spec.ts tests/e2e/specs/multisite-network-admin.spec.ts tests/e2e/specs/multisite-stack-smoke.spec.ts

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Patch wp-env for Composer audit compatibility
        run: node bin/patch-wp-env.js

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Start WordPress environment
        run: bash bin/wp-env-up.sh .wp-env.e2e.json

      - name: Assert pinned WordPress beta version
        env:
          WP_ENV_CONFIG_PATH: .wp-env.e2e.json
          WP_ENV_ASSERT_CONTAINERS: cli
        run: npm run env:assert-wp-version

      - name: Run E2E tests
        env:
          WP_ENV_CONFIG_PATH: .wp-env.e2e.json
        run: |
          set -euo pipefail
          ${{ matrix.test-command }}

      - name: Upload Playwright report on failure
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-${{ matrix.group-index }}-${{ matrix.group-name }}
          path: |
            playwright-report/
            tests/e2e/artifacts/test-results/
          retention-days: 7
          if-no-files-found: ignore

      - name: Stop WordPress environment
        if: always()
        run: npx wp-env stop --config .wp-env.e2e.json

  # Required status check. Always runs (even when the groups are skipped) so the
  # "E2E Tests" context is always reported. Passes when the groups succeeded, or
  # when they were skipped because the PR was documentation-only; fails on any
  # real group failure or cancellation.
  e2e-tests:
    name: "E2E Tests"
    runs-on: ubuntu-24.04
    needs: [changes, e2e-group]
    if: always()

    steps:
      - name: Check group results
        run: |
          if [ "${{ needs.changes.result }}" != "success" ]; then
            echo "Change detector did not succeed (${{ needs.changes.result }}) — failing the gate (fail-safe)."
            exit 1
          fi
          result="${{ needs.e2e-group.result }}"
          if [ "$result" = "success" ]; then
            echo "All E2E groups passed."
            exit 0
          fi
          if [ "$result" = "skipped" ] && [ "${{ needs.changes.outputs.code }}" != "true" ]; then
            echo "E2E groups skipped (documentation-only change) — passing the required gate."
            exit 0
          fi
          echo "E2E group matrix result: $result"
          exit 1
