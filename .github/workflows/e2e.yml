name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: e2e-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e-shard:
    name: "E2E Tests shard ${{ matrix.shard-index }}/${{ matrix.shard-total }}"
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        shard-index: [1, 2, 3, 4]
        shard-total: [4]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Patch wp-env for Composer audit compatibility
        run: node bin/patch-wp-env.js

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Start WordPress environment
        run: npx wp-env start --config .wp-env.e2e.json

      - name: Wait for WordPress to be ready
        run: |
          for i in $(seq 1 30); do
            if curl -s -o /dev/null -w "%{http_code}" http://localhost:8889/wp-login.php | grep -q "200"; then
              echo "WordPress is ready"
              break
            fi
            echo "Waiting for WordPress... (attempt $i)"
            sleep 2
          done

      - name: Assert pinned WordPress beta version
        env:
          WP_ENV_CONFIG_PATH: .wp-env.e2e.json
          WP_ENV_ASSERT_CONTAINERS: cli
        run: npm run env:assert-wp-version

      - name: Run E2E tests
        env:
          WP_ENV_CONFIG_PATH: .wp-env.e2e.json
        run: npm run test:e2e -- --shard=${{ matrix.shard-index }}/${{ matrix.shard-total }}

      - name: Upload Playwright report on failure
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-shard-${{ matrix.shard-index }}-of-${{ matrix.shard-total }}
          path: |
            playwright-report/
            tests/e2e/artifacts/test-results/
          retention-days: 7
          if-no-files-found: ignore

      - name: Stop WordPress environment
        if: always()
        run: npx wp-env stop --config .wp-env.e2e.json

  e2e-tests:
    name: "E2E Tests"
    runs-on: ubuntu-24.04
    needs: e2e-shard
    if: always()

    steps:
      - name: Check shard results
        run: |
          if [ "${{ needs.e2e-shard.result }}" != "success" ]; then
            echo "E2E shard matrix result: ${{ needs.e2e-shard.result }}"
            exit 1
          fi

          echo "All E2E shards passed."
