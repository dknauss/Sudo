name: Playground Preview

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  playground-preview:
    name: "Post Playground preview link"
    runs-on: ubuntu-24.04
    steps:
      - name: Check out PR
        uses: actions/checkout@v7

      - name: Post Playground preview comment
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const pr = context.payload.pull_request;
            const sha = pr.head.sha;
            const repoUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}`;

            const blueprint = JSON.parse(fs.readFileSync('blueprint.json', 'utf8'));
            const pluginStep = blueprint.steps.find(step => {
              if (step.step !== 'installPlugin') {
                return false;
              }

              const resource = step.pluginData || step.pluginZipFile || {};
              return (
                resource.resource === 'git:directory' ||
                (resource.resource === 'url' && resource.url && resource.url.includes(`${context.repo.owner}/${context.repo.repo}`))
              );
            });

            if (!pluginStep) {
              core.setFailed('blueprint.json does not contain a first-party plugin install step.');
              return;
            }

            delete pluginStep.pluginZipFile;
            // Pin the install to the PR commit via a plain GitHub archive .zip
            // (resource: 'url'), NOT git:directory. Playground's git-clone path
            // currently fails with "createHash is not a function", while plain
            // .zip downloads are unaffected; a commit archive installs the exact
            // SHA and dodges that regression.
            pluginStep.pluginData = {
              resource: 'url',
              url: `${repoUrl}/archive/${sha}.zip`,
            };

            const encoded = encodeURIComponent(JSON.stringify(blueprint));
            const playgroundUrl = `https://playground.wordpress.net/#${encoded}`;

            const body = [
              '## 🎮 Try in WordPress Playground',
              '',
              `[**Open this PR in Playground →**](${playgroundUrl})`,
              '',
              'Preview is pinned to WordPress `7.0`.',
              '',
              `Uses the checked-in \`blueprint.json\` from this PR, with the plugin install pinned to commit \`${sha}\` via a GitHub archive \`.zip\` (\`resource: url\`).`,
              '',
              'Logs in as `admin` / `password`; use `password` again for the WP Sudo reauthentication challenge.',
              '',
              '### ✅ What you can test',
              '',
              '| Feature | Notes |',
              '|---|---|',
              '| Plugin activation & settings page | ✅ |',
              '| Gate fires on dangerous actions (plugin activate/delete, user delete, etc.) | ✅ |',
              '| Challenge / reauthentication page | ✅ |',
              '| Password verification & session cookie | ✅ |',
              '| Admin bar countdown timer | ✅ |',
              '| Request stash & replay after auth | ✅ |',
              '| Rate limiting / 5-attempt lockout | ✅ within session |',
              '| Session expiry by time | ✅ wait out the configured duration (1–15 min) |',
              '| Two Factor plugin (TOTP) | ✅ installed automatically via blueprint |',
              '| `unfiltered_html` removed from Editor role | ✅ |',
              '',
              '### ❌ What won\'t work',
              '',
              '| Feature | Why |',
              '|---|---|',
              '| WP-CLI / Cron entry point policies | No CLI in browser |',
              '| REST / XML-RPC entry point policies | Network disabled in Playground |',
              '| Two Factor email / magic-link providers | PHP outbound network is off |',
              '| Multisite behaviour | Single-site only |',
              '| State after refreshing Playground | Full reset on page reload |',
              '',
              '> Transients and user meta persist across normal WP navigation within',
              '> a session, but are wiped if you reload the Playground page itself.',
              '> Use the [integration test suite](tests/Integration/) to verify',
              '> transient TTL, real bcrypt, and multisite isolation.',
            ].join('\n');

            // Update existing bot comment if present, otherwise create one.
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
            });

            const existing = comments.find(
              c =>
                c.user.login === 'github-actions[bot]' &&
                c.body.includes('Try in WordPress Playground'),
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body,
              });
            }
