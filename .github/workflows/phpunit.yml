name: PHPUnit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 3 * * *'  # Nightly at 3 AM UTC — catches stable floor and 7.0 regressions.

# Least-privilege default for GITHUB_TOKEN (CodeQL actions hardening). Jobs that
# need more (the change detector's pull-requests: read; notify-on-failure's
# issues: write) set it per-job.
permissions:
  contents: read

jobs:
  # Documentation-only pull requests skip the heavy test/quality jobs; the
  # "PHPUnit" gate job below always runs and reports the required status, so the
  # required check is never left pending (which would deadlock the PR).
  # Fail-safe: any non-doc file, any non-pull_request event (push / nightly
  # schedule), or any error → run the heavy jobs.
  changes:
    name: Detect code changes
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      pull-requests: read
    outputs:
      code: ${{ steps.decide.outputs.code }}
    steps:
      - name: Decide whether to run the heavy jobs
        id: decide
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "Event '${{ github.event_name }}' is not a pull_request — running heavy jobs."
            echo "code=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if ! files=$(gh pr view "${{ github.event.pull_request.number }}" \
                --repo "${{ github.repository }}" --json files \
                --jq '.files[].path' 2>/dev/null); then
            echo "Could not list changed files — running heavy jobs (fail-safe)."
            echo "code=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          code=false
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            case "$f" in
              *.md|*.txt|*.rst|docs/*|LICENSE) ;;   # documentation — does not require the test suite
              *) code=true ;;                        # any non-doc file requires the test suite
            esac
          done <<< "$files"
          echo "Changed files:"
          echo "$files"
          echo "Non-documentation files changed: $code"
          echo "code=$code" >> "$GITHUB_OUTPUT"

  unit-tests:
    name: "Unit Tests (PHP ${{ matrix.php }})"
    needs: changes
    if: ${{ needs.changes.outputs.code == 'true' }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3', '8.4']
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: composer:v2
          coverage: none

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@v5
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run unit tests
        # Random order guards against cross-file test coupling (leaked
        # process-global state). PHPUnit prints "Random Seed: N" in its
        # header; reproduce a failure locally with
        # ./vendor/bin/phpunit --order-by=random --random-order-seed=N
        # The coverage job below stays in default order so one
        # deterministic lane remains for comparison.
        run: composer test:unit -- --order-by=random

  unit-tests-coverage:
    name: "Unit Tests (Coverage)"
    needs: changes
    if: ${{ needs.changes.outputs.code == 'true' }}
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2
          coverage: pcov

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@v5
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run unit tests with coverage
        run: composer test:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage.xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          flags: unit
          name: unit-tests
          fail_ci_if_error: false
          verbose: true

  integration-tests:
    name: "Integration Tests (PHP ${{ matrix.php }}, WP ${{ matrix.wp }}, MS ${{ matrix.multisite }}, ${{ matrix.db_label }})"
    needs: changes
    if: ${{ needs.changes.outputs.code == 'true' }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        # Phase 13.1 CI-speed trim: keep all five single-site lanes, one
        # multisite representative (PHP 8.3 / WP 7.0), and the MariaDB lane.
        # Dropped redundant multisite lanes: PHP 8.2 / WP 6.7, PHP 8.3 / WP
        # 6.7, and PHP 8.2 / WP 7.0. Multisite-specific tests still run in
        # the retained latest-combo multisite lane; broader single-site
        # PHP/WP coverage remains in the five non-multisite lanes.
        include:
          - php: '8.2'
            wp: '6.4'
            multisite: false
            db_label: 'MySQL 8.0'
            db_image: 'public.ecr.aws/docker/library/mysql:8.0'
          - php: '8.2'
            wp: '6.7'
            multisite: false
            db_label: 'MySQL 8.0'
            db_image: 'public.ecr.aws/docker/library/mysql:8.0'
          - php: '8.3'
            wp: '6.7'
            multisite: false
            db_label: 'MySQL 8.0'
            db_image: 'public.ecr.aws/docker/library/mysql:8.0'
          - php: '8.2'
            wp: '7.0'
            multisite: false
            db_label: 'MySQL 8.0'
            db_image: 'public.ecr.aws/docker/library/mysql:8.0'
          - php: '8.3'
            wp: '7.0'
            multisite: false
            db_label: 'MySQL 8.0'
            db_image: 'public.ecr.aws/docker/library/mysql:8.0'
          - php: '8.3'
            wp: '7.0'
            multisite: true
            db_label: 'MySQL 8.0'
            db_image: 'public.ecr.aws/docker/library/mysql:8.0'
          - php: '8.2'
            wp: '6.7'
            multisite: false
            db_label: 'MariaDB LTS'
            db_image: 'mariadb:lts'
    services:
      db:
        image: ${{ matrix.db_image }}
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_ALLOW_EMPTY_PASSWORD: 'yes'
          MYSQL_ROOT_HOST: '%'
          MYSQL_DATABASE: wordpress_test
          MARIADB_ROOT_PASSWORD: root
          MARIADB_ALLOW_EMPTY_ROOT_PASSWORD: 'yes'
          MARIADB_AUTO_UPGRADE: '1'
        ports:
          - 3306:3306
        options: ${{ matrix.db_image == 'mariadb:lts' && '--health-cmd="healthcheck.sh --connect --innodb_initialized" --health-interval=5s --health-timeout=10s --health-retries=12 --health-start-period=60s' || '--health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=5' }}
    env:
      WP_TESTS_DIR: /tmp/wordpress-tests-lib
      WP_MULTISITE: ${{ matrix.multisite && '1' || '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install SVN and unzip
        run: sudo apt-get update && sudo apt-get install -y subversion unzip

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: composer:v2
          extensions: mysqli
          coverage: none

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@v5
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Cache WordPress test library
        uses: actions/cache@v5
        with:
          path: |
            /tmp/wordpress-tests-lib/includes
            /tmp/wordpress-tests-lib/data
            /tmp/wordpress
          key: wp-tests-${{ matrix.wp }}-${{ hashFiles('bin/install-wp-tests.sh') }}
          restore-keys: wp-tests-${{ matrix.wp }}-

      - name: Install WordPress test suite
        env:
          WP_SUDO_FORCE_DROP_DB: '1'
        run: |
          rm -f /tmp/wordpress-tests-lib/wp-tests-config.php
          bash bin/install-wp-tests.sh wordpress_test root root 127.0.0.1 ${{ matrix.wp }}

      - name: Run integration tests
        run: composer test:integration

  code-quality:
    name: "Code Quality (lint + static analysis)"
    needs: changes
    if: ${{ needs.changes.outputs.code == 'true' }}
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2
          coverage: none

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@v5
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Verify metrics file drift
        run: composer verify:metrics

      - name: Run PHPCS
        run: composer lint

      - name: Run PHPStan
        run: composer analyse:phpstan

  # Required status check. Always runs (even when the heavy jobs are skipped) so
  # the "PHPUnit" context is always reported. Passes when the heavy jobs
  # succeeded, or when they were skipped because the PR was documentation-only;
  # fails on any real failure or cancellation.
  phpunit-summary:
    name: "PHPUnit"
    runs-on: ubuntu-24.04
    needs: [changes, unit-tests, unit-tests-coverage, integration-tests, code-quality]
    if: ${{ always() }}
    steps:
      - name: Enforce successful PHPUnit workflow jobs
        run: |
          if [ "${{ needs.changes.result }}" != "success" ]; then
            echo "Change detector did not succeed (${{ needs.changes.result }}) — failing the gate (fail-safe)."
            exit 1
          fi
          if [ "${{ needs.changes.outputs.code }}" != "true" ]; then
            echo "Documentation-only change — heavy jobs skipped; passing the PHPUnit gate."
            exit 0
          fi
          for result in \
            "${{ needs.unit-tests.result }}" \
            "${{ needs.unit-tests-coverage.result }}" \
            "${{ needs.integration-tests.result }}" \
            "${{ needs.code-quality.result }}"; do
            if [ "$result" != "success" ]; then
              echo "PHPUnit workflow dependency did not succeed: $result"
              exit 1
            fi
          done
          echo "All PHPUnit jobs passed."

  notify-on-failure:
    name: "Notify on failure"
    runs-on: ubuntu-24.04
    needs: [unit-tests, unit-tests-coverage, integration-tests, code-quality]
    if: failure() && github.event_name == 'schedule'
    permissions:
      issues: write
    steps:
      - name: Create GitHub issue
        uses: actions/github-script@v9
        with:
          script: |
            const today = new Date().toISOString().slice(0, 10);
            const title = `🚨 Nightly CI failure — ${today}`;
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'ci-failure',
            });
            const alreadyOpen = issues.some(i => i.title === title);
            if (!alreadyOpen) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body: `The nightly CI run failed on ${today}.\n\n[View run](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
                labels: ['ci-failure'],
              });
            }

      - name: Notify Slack
        uses: slackapi/slack-github-action@v3
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": ":x: *wp-sudo nightly CI failed* — ${{ github.run_id }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": ":x: *wp-sudo nightly CI failed*\n<https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|View run>"
                  }
                }
              ]
            }
