name: E2E Nginx Smoke

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 2'

# Least-privilege default for GITHUB_TOKEN (CodeQL actions hardening).
permissions:
  contents: read

jobs:
  # See e2e.yml for the rationale. Documentation-only pull requests skip the
  # heavy smoke job; the "E2E Nginx Smoke" gate job below always runs and
  # reports the required status. Fail-safe: any non-doc file, any
  # non-pull_request event (push / schedule / workflow_dispatch), or any error
  # → run the smoke job.
  changes:
    name: Detect code changes
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      pull-requests: read
    outputs:
      code: ${{ steps.decide.outputs.code }}
    steps:
      - name: Decide whether to run the smoke job
        id: decide
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "Event '${{ github.event_name }}' is not a pull_request — running smoke."
            echo "code=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if ! files=$(gh pr view "${{ github.event.pull_request.number }}" \
                --repo "${{ github.repository }}" --json files \
                --jq '.files[].path' 2>/dev/null); then
            echo "Could not list changed files — running smoke (fail-safe)."
            echo "code=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          code=false
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            case "$f" in
              *.md|*.txt|*.rst|docs/*|LICENSE) ;;   # documentation — does not require the smoke job
              *) code=true ;;                        # any non-doc file requires the smoke job
            esac
          done <<< "$files"
          echo "Changed files:"
          echo "$files"
          echo "Non-documentation files changed: $code"
          echo "code=$code" >> "$GITHUB_OUTPUT"

  nginx-smoke:
    name: "E2E Nginx Smoke (run)"
    needs: changes
    if: ${{ needs.changes.outputs.code == 'true' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Start nginx stack
        run: docker compose -f .github/docker/nginx-mariadb.compose.yml up -d --wait db php nginx

      - name: Wait for nginx WordPress bootstrap files
        run: |
          for i in $(seq 1 30); do
            if curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:9080/wp-admin/install.php | grep -Eq "200|302"; then
              echo "WordPress bootstrap files are ready"
              exit 0
            fi
            echo "Waiting for bootstrap files... (attempt $i)"
            sleep 2
          done
          exit 1

      - name: Install WordPress and activate WP Sudo
        run: |
          docker compose -f .github/docker/nginx-mariadb.compose.yml run --rm cli wp core install \
            --path=/var/www/html \
            --url=http://127.0.0.1:9080 \
            --title='WP Sudo Nginx Smoke' \
            --admin_user=admin \
            --admin_password=password \
            --admin_email=dev@example.com \
            --skip-email
          for cap in manage_wp_sudo view_wp_sudo_activity export_wp_sudo_activity revoke_wp_sudo_sessions; do
            docker compose -f .github/docker/nginx-mariadb.compose.yml run --rm cli wp user add-cap admin "$cap" --path=/var/www/html
          done
          docker compose -f .github/docker/nginx-mariadb.compose.yml run --rm cli wp plugin activate wp-sudo --path=/var/www/html

      - name: Wait for nginx WordPress to be ready
        run: |
          for i in $(seq 1 30); do
            if curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:9080/wp-login.php | grep -q "200"; then
              echo "WordPress is ready"
              exit 0
            fi
            echo "Waiting for WordPress... (attempt $i)"
            sleep 2
          done
          exit 1

      - name: Run stack smoke tests
        env:
          WP_BASE_URL: http://127.0.0.1:9080
          WP_REQUEST_BASE_URL: http://127.0.0.1:9080
          WP_SUDO_SKIP_WP_ENV_CAP_SETUP: '1'
        run: npm run test:e2e:stack-smoke

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: playwright-nginx-report
          path: |
            playwright-report/
            tests/e2e/artifacts/test-results/
          retention-days: 7
          if-no-files-found: ignore

      - name: Stop nginx stack
        if: always()
        run: docker compose -f .github/docker/nginx-mariadb.compose.yml down -v

  # Required status check. Always runs (even when the smoke job is skipped) so
  # the "E2E Nginx Smoke" context is always reported. Passes when the smoke job
  # succeeded, or when it was skipped because the PR was documentation-only;
  # fails on any real failure or cancellation.
  e2e-nginx-smoke:
    name: "E2E Nginx Smoke"
    runs-on: ubuntu-24.04
    needs: [changes, nginx-smoke]
    if: always()

    steps:
      - name: Check smoke result
        run: |
          if [ "${{ needs.changes.result }}" != "success" ]; then
            echo "Change detector did not succeed (${{ needs.changes.result }}) — failing the gate (fail-safe)."
            exit 1
          fi
          result="${{ needs.nginx-smoke.result }}"
          if [ "$result" = "success" ]; then
            echo "Nginx smoke passed."
            exit 0
          fi
          if [ "$result" = "skipped" ] && [ "${{ needs.changes.outputs.code }}" != "true" ]; then
            echo "Nginx smoke skipped (documentation-only change) — passing the required gate."
            exit 0
          fi
          echo "Nginx smoke result: $result"
          exit 1
